services:
  vitcore:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_KEY: ${VITE_API_KEY:-vitcore_forensics_secure_token_2026}
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    volumes:
      - ./weights:/app/weights:ro
      - ./data:/app/data
    restart: unless-stopped

    # Uncomment to enable GPU access (requires NVIDIA Container Toolkit).
